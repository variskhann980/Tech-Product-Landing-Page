<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-circles">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
    </div>
    
    <div class="dashboard">
        <aside class="sidebar">
            <h2>Dash.io</h2>
            <nav>
                <a href="#" class="active">Overview</a>
                <a href="#">Analytics</a>
                <a href="#">Projects</a>
                <a href="#">Settings</a>
            </nav>
        </aside>
        
        <main class="main-content">
            <header>
                <h1>Welcome Back, Dev</h1>
                <p>Here is your progress update.</p>
            </header>
            
            <section class="stats-grid">
                <div class="stat-card">
                    <h4>Total Commits</h4>
                    <p class="stat-number">142</p>
                </div>
                <div class="stat-card">
                    <h4>Hours Coded</h4>
                    <p class="stat-number">320h</p>
                </div>
                <div class="stat-card">
                    <h4>Success Rate</h4>
                    <p class="stat-number">94%</p>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
